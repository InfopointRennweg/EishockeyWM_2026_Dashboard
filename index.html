<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>IIHF WM 2026 Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: linear-gradient(135deg, #fdfbfa 0%, #f9ebeb 100%);
            --panel-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-red: #da291c; /* Offizielles Schweizer Rot */
            --accent-blue: #0284c7; /* Schönes Eisblau für Kontraste */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(218, 41, 28, 0.15);
            backdrop-filter: blur(8px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #0f172a;
        }

        .logo span { color: var(--accent-red); }

        .time-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* 2-Spalten Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
            flex: 1;
            overflow: hidden;
        }

        .column {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(218, 41, 28, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(218, 41, 28, 0.05);
        }

        h2 {
            font-size: 1.2rem;
            color: var(--accent-red);
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            flex-wrap: wrap; /* Erlaubt das Umbrechen von Untertiteln auf kleineren Bildschirmen */
            gap: 10px;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }
        .content-scroll::-webkit-scrollbar { display: none; } /* Chrome */

        /* News Item */
        .news-item {
            background: rgba(255, 255, 255, 0.65);
            border-radius: 8px;
            padding: 0.85rem 1rem;
            margin-bottom: 0.85rem;
            border-left: 4px solid var(--accent-red);
            display: flex; /* Layout für Bild + Text */
            gap: 1rem;
            align-items: center;
            border-top: 1px solid rgba(0,0,0,0.02);
            border-right: 1px solid rgba(0,0,0,0.02);
            border-bottom: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 4px 12px rgba(218, 41, 28, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .news-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(218, 41, 28, 0.05);
        }

        .news-image {
            width: 75px;
            height: 75px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
            background-color: rgba(0,0,0,0.03); /* Platzhalter-Hintergrund */
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .news-content {
            flex: 1;
            min-width: 0; /* Verhindert Überlaufen im Flex-Container bei langem Text */
        }
        .news-title { 
            font-weight: 600; 
            margin-bottom: 0.4rem; 
            font-size: 1.05rem; 
            color: #0f172a; 
            word-break: break-word; /* Bricht extrem lange Wörter um, statt sie abzuschneiden */
            hyphens: auto; /* Silbentrennung */
            line-height: 1.35;
            padding-right: 0.6rem; /* Sicherer Abstand zum rechten Rand, um Abschneiden zu verhindern */
        }
        .news-date { font-size: 0.8rem; color: var(--text-muted); }

        /* Schedule Half Split */
        .schedule-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .news-half {
            flex: 0 0 auto; /* Passt sich exakt den 2 News-Karten an */
            display: flex;
            flex-direction: column;
        }

        /* Schedule Item */
        .schedule-item { 
            border-left: 4px solid var(--accent-blue); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(255, 255, 255, 0.65);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-top: 1px solid rgba(0,0,0,0.02);
            border-right: 1px solid rgba(0,0,0,0.02);
            border-bottom: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .schedule-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(2, 132, 199, 0.05);
        }

        .schedule-item.swiss-match {
            border-left: 4px solid var(--accent-red);
            box-shadow: 0 4px 12px rgba(218, 41, 28, 0.02);
        }

        .schedule-item.swiss-match:hover {
            box-shadow: 0 6px 16px rgba(218, 41, 28, 0.05);
        }
        
        .teams { font-weight: 700; font-size: 1.2rem; color: #0f172a; }
        .match-info { text-align: right; }
        .match-time { color: var(--accent-red); font-weight: bold; }
        .match-venue { font-size: 0.8rem; color: var(--text-muted); }

        .loading { text-align: center; color: var(--text-muted); margin-top: 2rem; }

    </style>
</head>
<body>

    <header>
        <div class="logo">IIHF WM <span>2026</span> Schweiz</div>
        <div class="time-info">
            <div id="clock" style="font-size: 1.2rem; font-weight: bold; color: #0f172a;">00:00:00</div>
            <div id="next-update">Nächstes Update berechnen...</div>
        </div>
    </header>

    <div class="dashboard-grid">
        <!-- Spalte 1 (links): News + Resultate -->
        <div class="column">
            <!-- Upper Half: News (Hugs Content) -->
            <div class="news-half">
                <h2>📰 Aktuelle News <span style="font-size: 0.85rem; color: var(--text-muted); text-transform: none; font-weight: normal; margin-left: auto;">(srf.ch/sport)</span></h2>
                <div id="news-container">
                    <div class="loading">Lade News...</div>
                </div>
            </div>

            <!-- Divider Line -->
            <div style="height: 1px; background: rgba(0, 0, 0, 0.08); margin: 0.75rem 0; flex-shrink: 0;"></div>

            <!-- Lower Half: Past Results -->
            <div class="schedule-half">
                <h2>🏆 Spiel-Resultate (Gruppe A) <span style="font-size: 0.85rem; color: var(--text-muted); text-transform: none; font-weight: normal; margin-left: auto;">(srf.ch)</span></h2>
                <div class="content-scroll" id="past-results-container">
                    <div class="loading">Lade Resultate...</div>
                </div>
            </div>
        </div>

        <!-- Spalte 2 (rechts): Spiele des Tages -->
        <div class="column">
            <h2 id="today-games-title">📅 Spiele des Tages <span style="font-size: 0.85rem; color: var(--text-muted); text-transform: none; font-weight: normal; margin-left: auto;">(srf.ch)</span></h2>
            <div class="content-scroll" id="today-games-container">
                <div class="loading">Lade Spiele des Tages...</div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Lade die JSON Daten ---
        async function fetchDashboardData() {
            try {
                // Hängt einen Zeitstempel an, um den Wix-Cache auszutricksen
                const response = await fetch('data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Daten konnten nicht geladen werden');
                const data = await response.json();
                
                renderNews(data.news);
                renderTodayGames(data.schedule.today_games);
                renderPastResults(data.schedule.past_results);
            } catch (error) {
                console.error(error);
                document.getElementById('news-container').innerHTML = '<div class="loading">Fehler beim Laden der Daten. Bitte später prüfen.</div>';
                document.getElementById('today-games-container').innerHTML = '';
                document.getElementById('past-results-container').innerHTML = '';
            }
        }

        // --- 2. HTML Rendern ---
function renderNews(newsArray) {
            const container = document.getElementById('news-container');
            if(!newsArray || newsArray.length === 0) {
                container.innerHTML = '<div class="loading">Keine News verfügbar.</div>';
                return;
            }
            container.innerHTML = newsArray.map(item => {
                // Wenn ein Bild da ist, zeige es. Wenn es beim Laden kaputt geht (onerror), zeige ein Emoji.
                // Wenn gar kein Bild-Link gefunden wurde, zeige direkt das Emoji.
                const imgHtml = item.image 
                    ? `<img src="${item.image}" class="news-image" alt="News" onerror="this.outerHTML='<div class=\\'news-image\\' style=\\'display:flex; align-items:center; justify-content:center; font-size:2rem; background:rgba(255,255,255,0.05)\\'>🏒</div>'">` 
                    : `<div class="news-image" style="display:flex; align-items:center; justify-content:center; font-size:2rem; background:rgba(255,255,255,0.05)">🏒</div>`;
                
                return `
                <div class="news-item">
                    ${imgHtml}
                    <div class="news-content">
                        <div class="news-date">${item.date}</div>
                        <div class="news-title">${item.title}</div>
                    </div>
                </div>
            `}).join('');
        }

        function renderTodayGames(gamesArray) {
            const container = document.getElementById('today-games-container');
            const titleEl = document.getElementById('today-games-title');
            
            if(!gamesArray || gamesArray.length === 0) {
                container.innerHTML = '<div class="loading">Heute finden keine Gruppenspiele statt.</div>';
                if (titleEl) {
                    titleEl.innerHTML = `📅 Spiele des Tages <span style="font-size: 0.85rem; color: var(--text-muted); text-transform: none; font-weight: normal; margin-left: auto;">(srf.ch)</span>`;
                }
                return;
            }
            
            // Setze den Titel dynamisch auf das Datum des Spieltags
            const firstGameDate = gamesArray[0].date_str;
            if (titleEl) {
                titleEl.innerHTML = `📅 Spiele vom ${firstGameDate} <span style="font-size: 0.85rem; color: var(--text-muted); text-transform: none; font-weight: normal; margin-left: auto;">(srf.ch)</span>`;
            }
            
            container.innerHTML = gamesArray.map(game => {
                const isSwissMatch = game.team1 === 'Schweiz' || game.team2 === 'Schweiz';
                const borderClass = isSwissMatch ? 'swiss-match' : '';
                
                // Score-Layout
                const scoreHtml = game.score 
                    ? `<div style="font-size: 1.4rem; font-weight: 800; color: ${isSwissMatch ? 'var(--accent-red)' : 'var(--accent-blue)'}; font-family: monospace; text-align: right; margin-bottom: 2px;">${game.score}</div>` 
                    : '';
                
                // Status-Info (z.B. Uhrzeit oder LIVE-Blinker)
                const isLive = game.state === 'Running' || game.state === 'Live';
                const statusHtml = isLive 
                    ? `<span class="live-badge" style="background: var(--accent-red); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; animation: pulse 1.5s infinite; display: inline-block;">LIVE</span>`
                    : `<div class="match-time" style="color: ${isSwissMatch ? 'var(--accent-red)' : 'var(--accent-blue)'}; font-weight: bold; font-size: 1rem; margin-bottom: 2px;">${game.time} Uhr</div>`;
                
                return `
                <div class="schedule-item ${borderClass}" style="gap: 1rem; padding: 1rem 1.25rem; margin-bottom: 1rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img src="https://cdn-csd.swisstxt.ch/images/geo/country/flag/medium/${game.team1_country}.png" style="width: 28px; height: 18px; object-fit: contain; border-radius: 2px; border: 1px solid rgba(0,0,0,0.05);" onerror="this.style.display='none'">
                            <span style="font-weight: 700; font-size: 1.15rem; color: #0f172a;">${game.team1}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img src="https://cdn-csd.swisstxt.ch/images/geo/country/flag/medium/${game.team2_country}.png" style="width: 28px; height: 18px; object-fit: contain; border-radius: 2px; border: 1px solid rgba(0,0,0,0.05);" onerror="this.style.display='none'">
                            <span style="font-weight: 700; font-size: 1.15rem; color: #0f172a;">${game.team2}</span>
                        </div>
                    </div>
                    <div class="match-info" style="text-align: right; display: flex; flex-direction: column; justify-content: center; min-width: 90px;">
                        ${scoreHtml}
                        ${statusHtml}
                        <div class="match-venue" style="font-size: 0.75rem; color: var(--text-muted); margin-top: 2px;">${game.venue}</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderPastResults(gamesArray) {
            const container = document.getElementById('past-results-container');
            if(!gamesArray || gamesArray.length === 0) {
                container.innerHTML = '<div class="loading">Keine Resultate vorhanden.</div>';
                return;
            }
            container.innerHTML = gamesArray.slice(0, 5).map(game => { // Zeige maximal 5 Resultate für Infoscreen
                const isSwissMatch = game.team1 === 'Schweiz' || game.team2 === 'Schweiz';
                const borderClass = isSwissMatch ? 'swiss-match' : '';
                const scoreHtml = game.score 
                    ? `<div style="font-size: 1.3rem; font-weight: 800; color: ${isSwissMatch ? 'var(--accent-red)' : 'var(--accent-blue)'}; font-family: monospace; text-align: right; margin-bottom: 2px;">${game.score}</div>` 
                    : '';
                
                return `
                <div class="schedule-item ${borderClass}" style="gap: 1rem; padding: 0.85rem 1rem; margin-bottom: 0.75rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.4rem; flex: 1;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <img src="https://cdn-csd.swisstxt.ch/images/geo/country/flag/medium/${game.team1_country}.png" style="width: 24px; height: 16px; object-fit: contain; border-radius: 2px; border: 1px solid rgba(0,0,0,0.05);" onerror="this.style.display='none'">
                            <span style="font-weight: 600; font-size: 1rem; color: #0f172a;">${game.team1}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <img src="https://cdn-csd.swisstxt.ch/images/geo/country/flag/medium/${game.team2_country}.png" style="width: 24px; height: 16px; object-fit: contain; border-radius: 2px; border: 1px solid rgba(0,0,0,0.05);" onerror="this.style.display='none'">
                            <span style="font-weight: 600; font-size: 1rem; color: #0f172a;">${game.team2}</span>
                        </div>
                    </div>
                    <div class="match-info" style="text-align: right; display: flex; flex-direction: column; justify-content: center;">
                        ${scoreHtml}
                        <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500; margin-bottom: 2px;">${game.date_str}</div>
                        <div style="font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px;">${game.venue}</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // --- 3. Live-Uhr ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('de-CH');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 4. Update-Logik (06:00, 08:30, 14:30 und 18:30) ---
        function scheduleNextReload() {
            const now = new Date();
            
            // Definiere die vier Zielzeiten von heute
            const target1 = new Date(now); target1.setHours(6, 0, 0, 0);
            const target2 = new Date(now); target2.setHours(8, 30, 0, 0);
            const target3 = new Date(now); target3.setHours(14, 30, 0, 0);
            const target4 = new Date(now); target4.setHours(18, 30, 0, 0);

            const targets = [target1, target2, target3, target4];
            let nextUpdate = null;

            // Finde die nächste Zielzeit, die in der Zukunft liegt
            for (const t of targets) {
                if (now < t) {
                    nextUpdate = t;
                    break;
                }
            }

            // Falls alle Zeiten von heute vorbei sind → morgen 06:00
            if (!nextUpdate) {
                nextUpdate = new Date(target1);
                nextUpdate.setDate(nextUpdate.getDate() + 1);
            }

            const msUntilUpdate = nextUpdate.getTime() - now.getTime();
            
            // Zeige an, wann das nächste Update passiert
            document.getElementById('next-update').textContent = `Nächstes Update: ${nextUpdate.toLocaleTimeString('de-CH', {hour: '2-digit', minute:'2-digit'})} Uhr`;

            // Seite nach Ablauf der Zeit neu laden
            setTimeout(() => {
                window.location.reload(true);
            }, msUntilUpdate);
        }

        // Initialer Start
        fetchDashboardData();
        scheduleNextReload();
    </script>
</body>
</html>
